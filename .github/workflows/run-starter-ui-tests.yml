# GitHub Actions Workflow for running IntelliJ IDE Starter UI tests.
#
# Unlike the legacy Remote Robot UI tests (run-ui-tests.yml), IDE Starter tests
# launch and manage their own IDE instance internally via runIdeWithDriver(),
# so there is no need to start the IDE separately.
#
# Workflow is triggered manually.

name: Run Starter UI Tests
on:
  workflow_dispatch

jobs:
  starter-ui-test:
    name: Starter UI Tests (Linux)
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_org.jetbrains.intellij.platform.useCacheRedirector: false
      STARTER_UI_TEST_TIMEOUT_MINUTES: 75
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup virtual display
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb x11-utils
          Xvfb -ac :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99.0" >> $GITHUB_ENV

      - name: Run Starter UI Tests
        shell: bash
        timeout-minutes: 90
        run: |
          set -o pipefail
          mkdir -p build/reports/starter-ui-test
          ./gradlew starterUiTest --info --stacktrace -Dstarter.ui.test.task.timeout.minutes=${STARTER_UI_TEST_TIMEOUT_MINUTES} 2>&1 | tee build/reports/starter-ui-test/gradle-starterUiTest.log

      - name: Collect IDE Starter diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -o pipefail
          diagnostics_dir="build/reports/starter-ui-test/ide-starter-diagnostics"
          mkdir -p "$diagnostics_dir"

          if [ -d "out/ide-tests/tests" ]; then
            find out/ide-tests/tests -type f \( -path '*/log/*' -o -path '*/reports/*' \) -exec cp --parents {} "$diagnostics_dir" \;
          fi

      - name: Collect test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: starter-ui-test-results
          if-no-files-found: warn
          path: |
            build/reports/
            build/test-results/starterUiTest/
            build/allure-results/starter-ui/
            build/starter-ui-tests/
